<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Chat WebSocket</title>

    <style>
        body { font-family: Arial; margin: 20px; }
        #status { margin-bottom: 10px; font-weight: bold; }
        #messages { border: 1px solid #ccc; height: 200px; overflow-y: auto; padding: 10px; }
        input { width: 70%; padding: 5px; }
        button { padding: 6px 10px; }
    </style>

    <!-- STOMP + SockJS (necesario para Spring) -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<h2>WebSocket Chat</h2>

<p>Cambiar id de usuario y de chat</p>

<div id="status">Desconectado ❌</div>

<div id="messages"></div>

<br>

<input type="text" id="messageInput" placeholder="Escribe un mensaje">
<button onclick="sendMessage()">Enviar</button>

<script>
    const chatId    = "35937478-c5c7-4820-ab88-d191b52e3fcc";
    const usuarioId = "bd4d4f16-5ce9-404b-a20c-c1cf849ae226";

    const statusDiv = document.getElementById("status");
    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("messageInput");

    let stompClient = null;

    // CONEXIÓN
    function connect() {
        const socket = new SockJS("http://localhost:8080/ws");
        stompClient = Stomp.over(socket);


        stompClient.connect({}, function () {

            statusDiv.textContent = "Conectado ✅";
            statusDiv.style.color = "green";

            // SUSCRIPCIÓN (RECIBIR MENSAJES)
            stompClient.subscribe("/recibir/chat/" + chatId, function (msg) {
                const data = JSON.parse(msg.body);

                console.log(data);

                // if (data.usuarioId === miUsuarioId) return; // ignorar

                addMessage(data.usuarioId+": "+data.mensaje);
            });
        });
    }

    // ENVIAR MENSAJE
    function sendMessage() {
        const message = input.value;

        if (!message) return;

        stompClient.send("/enviar/chat/enviar", {}, JSON.stringify({
            chatId:    chatId,
            usuarioId: "bd4d4f16-5ce9-404b-a20c-c1cf849ae226",
            mensaje: message,
            tipo: "TEXTO"
        }));

        addMessage("Tú: " + message);
        input.value = "";
    }

    // MOSTRAR MENSAJES
    function addMessage(text) {
        const div = document.createElement("div");
        div.textContent = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    connect();
</script>

</body>
</html>
