spring.application.name=chat

spring.datasource.url=jdbc:mysql://localhost:3306/chat
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.url=jdbc:mariadb://localhost:3306/chat
# spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=usuario
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

logging.level.com.jesus.proyecto=ERROR

jwt.secret.key=your-256-bit-secret-key-here-make-it-long-and-random
jwt.access.expiration=1m
jwt.refresh.expiration=5h
jwt.refresh.rotation=10m

file.max-size-mb=50

openai.api.key=
openai.api.url=https://api.groq.com/openai/v1/chat/completions
openai.model=groq/compound-mini

spring.jpa.open-in-view=false

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

server.address=0.0.0.0
server.port=8080