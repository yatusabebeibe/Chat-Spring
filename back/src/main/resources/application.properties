spring.application.name=chat

# spring.datasource.url=jdbc:mysql://localhost:3306/chat
spring.datasource.url=jdbc:mariadb://localhost:3306/chat
spring.datasource.username=usuario
spring.datasource.password=password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

logging.level.com.jesus.proyecto=ERROR
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# spring.devtools.restart.enabled=false

jwt.secret.key=your-256-bit-secret-key-here-make-it-long-and-random
jwt.access.expiration=1m
jwt.refresh.expiration=7d